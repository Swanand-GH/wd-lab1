<!DOCTYPE html>
<html>
<head>
    <title>Iframe Demo</title>
</head>
<body>

    <h1 align="center">Embedding Map and External Page using Iframe</h1>

    <h2>Nagpur Location Map</h2>
    <iframe
        src="https://www.google.com/maps?q=Nagpur&output=embed"
        width="600"
        height="350"
        style="border:2px solid black;">
    </iframe>

    <br><br>

    <h2>External Webpage</h2>
    <iframe
        src="https://www.wikipedia.org/"
        width="600"
        height="350"
        style="border:2px solid black;">
    </iframe>

</body>
</html>
